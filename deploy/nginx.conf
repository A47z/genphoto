proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=img_cache:10m max_size=1g inactive=7d;

server {
    listen 80;
    server_name your-server-ip;

    # Frontend static files
    root /opt/genphoto/frontend;
    index index.html;

    # Image file API - proxy to backend with nginx cache
    location ~ ^/api/images/\d+/file$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;

        # Cache images at nginx level
        proxy_cache img_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 304 7d;
        proxy_cache_key $uri;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Let browser cache too
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Other API - reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # Swagger
    location /v3/api-docs {
        proxy_pass http://127.0.0.1:8080;
    }
    location /swagger-ui {
        proxy_pass http://127.0.0.1:8080;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
